services:
  - type: web
    name: qtest-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: RENDER
        value: true
      - key: FRONTEND_URL
        value: https://qtest-platform.vercel.app
    disk:
      name: qtest-data
      mountPath: /opt/render/project/data
      sizeGB: 1
